<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
  <style>
      body { background-color: #f4f4f4; }
  </style>

    
</head>
<body class="body body-color ">
        <div id="modal01" class="modal" onclick="this.style.display='none'">
            <span class="close">&times;&nbsp;&nbsp;&nbsp;&nbsp;</span>
            <div class="modal-content">
                <img id="img01" style="width:600px">
            </div>
        </div>
    <main>


      <div class="Nav">
          <button class="active">Фон</button>
          <button class="">Изображение</button>
          <button class="">Музыка</button>
          <button class="">Видео</button>
      </div>


      <!-- TOOLS -->

      <div class="main">
        <!-- BACKGROUND -->
        <div class="bc">
          <div class="bc-color">
             <input type="color" id="color" name="color" value="#FF0000">
          </div>
          <div class="bc-img">
                <img onclick="changebc(this)" src="img/bc.jpg" alt="bc-img-1">
                <img onclick="changebc(this)" src="img/bc-2.jpg" alt="bc-img-2">
                <img onclick="changebc(this)" src="img/bc-3.jpg" alt="bc-img-3">
          </div>
        </div>


        <!-- IMAGE -->
        <div class="img none">
            <div class="img-nav">
                <button class="img-nav-btn active">Локальные</button>
                <button class="img-nav-btn">Глобальные</button>
            </div>

            <div class="save">
                <div class="save-images">
                    <img onclick="onClick(this)" src="img/images (1).jpg" alt="">
                    <img onclick="onClick(this)" src="img/images (2).jpg" alt="">
                    <img onclick="onClick(this)" src="img/images.jpg" alt="">
                    <img onclick="onClick(this)" src="img/cover1.jpg" alt="">
                    <img onclick="onClick(this)" src="img/İnTheEnd.jpg" alt="">
                </div>
            </div>
            <div class="img-search none">
                  <form id="img-search-form">
                    <input type="text" id="img-search-box" placeholder="Search Anything here">
                    <button class="">Search</button>
                  </form>
                  <div id="img-search-result" class="img-search-result">
                    
                  </div>
                  <button id="show-more-img-btn">Показать еще</button>
            </div>
        </div>



        <!-- VİDEO -->
        <div class="video none">
             <div class="video-container">
                <video id="video">
                    <source src="img/demo-video.mp4" type="video/mp4">
                    <track label="English" kind="subtitles" srclang="en" src="subtitles.vtt" default>
                    Your browser does not support the video tag.
                </video>
                
                <div class="video-controls">
                    <button class="play-pause" title="Play/Pause">▶</button>
                    <input type="range" class="progress" min="0" max="100" value="0" step="0.1">
                    <span class="time">
                        <span class="current-time">00:00</span> / <span class="duration">00:00</span>
                    </span>
                    <button class="mute" title="Mute/Unmute">🔊</button>
                    <input type="range" class="volume" min="0" max="1" value="1" step="0.1">
                    <button class="fullscreen" title="Fullscreen">⛶</button>
                </div>
            </div>

        </div>

      <!-- MUSIC -->
<div class=" music none music-player flex-column">

  <div class="slider center">
    <div class="slider__content center">

      <button class="music-player__playlist-button center button">
        <i class="icon-playlist"></i>
      </button>

      <button class="music-player__broadcast-guarantor center button">
        <i class="icon-play"></i>
        <i class="icon-pause"></i>
      </button>

      <div class="slider__imgs flex-row"></div>
    </div>

    <div class="slider__controls center">

      <button class="slider__switch-button flex-row button prev-btn">
        <i class="icon-back"></i>
      </button>

      <div class="music-player__info text_trsf-cap">

        <div>
          <div class="music-player__singer-name">
            <div></div>
          </div>
        </div>

        <div>
          <div class="music-player__subtitle">
            <div></div>
          </div>
        </div>

      </div>

      <button class="slider__switch-button flex-row button next-btn">
        <i class="icon-next"></i>
      </button>

      <div class="progress center">
        <div class="progress__wrapper">
          <div class="progress__bar center"></div>
        </div>
      </div>

    </div>
  </div>

  <ul class="music-player__playlist list"></ul>

</div>


      </div>





    </main>

    <script src="music.js"></script>
    <script src="videoplayer.js"></script>

  <script>
      const buttons = document.querySelectorAll('.Nav button');

      const bc = document.querySelector('.bc');
      const img = document.querySelector('.img');
      const music = document.querySelector('.music');
      const video = document.querySelector('.video');

      buttons.forEach(button => {
        button.addEventListener('click', () => {
          buttons.forEach(btn => {
            btn.classList.remove('active');
           });

          button.classList.add('active');

            if (button.textContent.trim() === 'Фон') {
              bc.classList.remove('none');
              img.classList.add('none');
              video.classList.add('none');
              music.classList.add('none');

            }

            if (button.textContent.trim() === 'Изображение') {
              img.classList.remove('none');
              bc.classList.add('none');
              video.classList.add('none');
              music.classList.add('none');
            }
            if (button.textContent.trim() === 'Видео') {
              img.classList.add('none');
              bc.classList.add('none');
              video.classList.remove('none');
              music.classList.add('none');
            }

           if (button.textContent.trim() === 'Музыка') {
            img.classList.add('none');
            bc.classList.add('none');
            video.classList.add('none');
            music.classList.remove('none');
          }

        });
      });
            

      let colorInput = document.getElementById('color')
      colorInput.addEventListener('input', (event) => {
        document.querySelector('body').className = ''

        const selectedColor = event.target.value;
          document.body.style.backgroundColor = selectedColor;
          document.querySelector('body').classList.remove('body-color')
          console.log("Live color:", selectedColor);
      });


    function changebc(element) {
       document.querySelector('body').className = ''
      document.querySelector('body').classList.add(element.alt)
    }



    const SearhcForm = document.getElementById('img-search-form');
    const SearhcBox = document.getElementById('img-search-box');
    const SearhcResult = document.getElementById('img-search-result');
    const SearhcBtn = document.getElementById('show-more-img-btn')
    let page = 1
    let keyword = ''
    console.log(SearhcResult)


      async function searchImages() {
        keyword = SearhcBox.value;

        try {
            const url = `https://api.unsplash.com/search/photos?page=${page}&query=${keyword}&client_id=4owCMDWRRdhr1xXvnDW9A2RvrpL6ueYs6bG8AL4Drh8`;

            const response = await fetch(url);

            if (!response.ok) {
                throw new Error("Ошибка API");
            }

            const data = await response.json();

            if (page === 1) {
                SearhcResult.innerHTML = "";
            }

            const results = data.results;

            results.forEach((result) => {
                const image = document.createElement("img");
                image.src = result.urls.small;

                image.onclick = function () {
                    onClick(this);
                };

                SearhcResult.appendChild(image);
            });

        } catch (error) {
            SearhcResult.innerHTML = `
                <p style="color:red; text-align:center;">
                    Нет подключения к интернету или произошла ошибка при загрузке изображений.
                </p>
            `;
            console.error(error);
        }
  }

    SearhcForm.addEventListener('submit', (e) => {
        e.preventDefault();
        page = 1;
        searchImages()
    })

    function onClick(element) {
        document.getElementById("img01").src = element.src;
        document.getElementById("modal01").style.display = "block";
    }
    const imgNav = document.querySelectorAll('.img-nav-btn');

    imgNav.forEach(button => {
        button.addEventListener('click', () => {

        imgNav.forEach(btn => {
            btn.classList.remove('active');

        });
             button.classList.add('active');
            document.querySelector('.save').classList.toggle('none')
            document.querySelector('.img-search').classList.toggle('none')

        });
    });



  </script>
</body>
</html>
